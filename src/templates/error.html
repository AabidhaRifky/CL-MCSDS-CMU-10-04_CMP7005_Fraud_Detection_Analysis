{% extends "base.html" %}

{% block page_title %}Security Halt{% endblock %}

{% block content %}
<div class="content-box" style="max-width: 600px; margin: 60px auto; text-align: center; padding: 60px;">
    <div style="width: 80px; height: 80px; background: rgba(255,118,117,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); font-size: 32px; margin: 0 auto 30px;">
        <i class="fas fa-microchip-slash"></i>
    </div>
    
    <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">{{ error }}</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px;">
        The system encountered an unexpected interruption. This could be due to missing model artifacts or an invalid request signature.
    </p>

    <div style="display: flex; gap: 15px; justify-content: center;">
        <a href="/" class="btn-submit" style="text-decoration: none; padding: 12px 24px;">Return to Command Center</a>
    </div>
</div>
{% endblock %}
