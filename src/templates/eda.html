{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-semibold mb-4">EDA Visualisations</h2>

<div class="grid grid-cols-3 gap-4">
    {% for img in images %}
    <div class="bg-white p-2 rounded-xl shadow">
        <img 
            src="{{ url_for('static', filename='figures/' + img) }}" 
            class="w-full rounded-lg"
        >
        <p class="text-xs mt-2 text-center text-gray-500">{{ img }}</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
